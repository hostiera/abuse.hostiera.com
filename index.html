<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Report Abuse</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">HOSTIERA</div>
  <div class="right">
    <span>🇮🇳 English</span>
    <button class="account-btn">My account</button>
  </div>
</header>

<main class="container">

  <!-- STEP 1 -->
  <div class="card active" id="step1">
    <h1>Report abuse</h1>
    <p>
      If you believe any service is being used for abuse such as spam,
      phishing, malware, copyright infringement or illegal content,
      report it below.
    </p>

    <label>Abuse type</label>
    <select id="abuseType">
      <option value="">Select abuse type</option>
      <option>Intellectual property infringements (incl. DMCA)</option>
      <option>Illegal or harmful speech</option>
      <option>Privacy violations</option>
      <option>Child sexual abuse material (CSAM)</option>
      <option>Adult sexual material</option>
    </select>

    <span class="error" id="typeError">This field is required</span>

    <button class="primary-btn" onclick="goStep2()">Continue</button>
  </div>

  <!-- STEP 2 -->
  <div class="card" id="step2">
    <p class="selected">
      Selected abuse type:
      <span id="selectedType"></span>
    </p>

    <input type="text" placeholder="Your name *" id="name">
    <input type="text" placeholder="Organisation name or role">
    <input type="email" placeholder="Your email address *" id="email">
    <input type="text" placeholder="Country of residence">

    <textarea placeholder="Abuser website or service *" id="website"></textarea>
    <textarea placeholder="Description of the issue *" id="description"></textarea>

    <button class="primary-btn" onclick="goStep3()">Continue</button>
    <button class="back-btn" onclick="backStep1()">Back</button>
  </div>

  <!-- STEP 3 -->
  <div class="card" id="step3">
    <h3>Upload evidence</h3>
    <div class="upload-box">
      <input type="file">
    </div>

    <textarea placeholder="Identify the copyrighted work *"></textarea>
    <textarea placeholder="Identify the infringing material *"></textarea>

    <div class="radio-group">
      <label><input type="radio" name="owner"> I am authorized</label>
      <label><input type="radio" name="owner"> I am the copyright owner</label>
    </div>

    <input type="text" placeholder="Electronic signature *">

    <label class="checkbox">
      <input type="checkbox"> I declare that the information is accurate
    </label>

    <button class="primary-btn">Send</button>
    <button class="back-btn" onclick="backStep2()">Back</button>
  </div>

</main>

<script src="script.js"></script>
</body>
</html>
